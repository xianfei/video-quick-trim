<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file: data:; media-src 'self' file: data:; style-src 'self' 'unsafe-inline';" />
  <title>Quick Trim</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Drop zone (initial state) -->
  <div id="dropzone" class="dropzone">
    <div class="drag-strip"></div>
    <div class="drop-inner">
      <div class="drop-icon">🎬</div>
      <div class="drop-title">拖拽视频到此处</div>
      <div class="drop-sub">或 <button id="open-btn" class="link-btn">点击打开</button></div>
    </div>
  </div>

  <!-- Editor (shown after a video is loaded) -->
  <div id="editor" class="editor hidden">
    <header class="topbar" id="topbar">
      <div class="title-wrap">
        <button id="close-btn" class="icon-btn" title="关闭">✕</button>
        <span id="filename" class="filename">—</span>
      </div>
      <div class="topbar-actions">
        <button id="adv-btn" class="adv-btn" title="高级导出">⋯</button>
        <button id="done-btn" class="done-btn">完成</button>
      </div>
    </header>

    <!-- Advanced export dropdown -->
    <div id="adv-menu" class="adv-menu hidden">
      <button class="adv-item" data-act="reencode">重编码导出…</button>
      <button class="adv-item" data-act="audio">仅导出音频…</button>
      <button class="adv-item" data-act="gif">转为 GIF…</button>
      <div class="adv-sep"></div>
      <button class="adv-item" data-act="stripAudio">移除音频（无损）</button>
      <button class="adv-item" data-act="frame">导出当前帧为图片</button>
    </div>

    <main class="stage">
      <video id="video" playsinline></video>
      <div id="preview-fallback" class="preview-fallback hidden">
        <div class="pf-icon">⚠️</div>
        <div class="pf-title">此视频编码无法在本机预览</div>
        <div class="pf-sub">常见于 HEVC / HDR。仍可正常裁剪与导出——无损模式无需解码。</div>
      </div>
    </main>

    <footer class="controls">
      <div class="controls-row">
        <button id="play-btn" class="play-btn" title="播放/暂停">▶</button>

        <div class="track-wrap">
          <div id="track" class="track">
            <div id="filmstrip" class="filmstrip"></div>
            <div id="dim-left" class="dim"></div>
            <div id="dim-right" class="dim"></div>
            <div id="sel" class="selection">
              <div id="handle-start" class="handle handle-start" data-which="start"></div>
              <div id="handle-end" class="handle handle-end" data-which="end"></div>
            </div>
            <div id="playhead" class="playhead"></div>
          </div>
        </div>
      </div>

      <div class="meta-row">
        <div class="time-group">
          <label>起点</label>
          <input id="start-input" class="time-input" value="00:00:00.000" />
        </div>
        <div class="time-group">
          <label>终点</label>
          <input id="end-input" class="time-input" value="00:00:00.000" />
        </div>
        <div class="time-group">
          <label>时长</label>
          <span id="dur-label" class="dur-label">00:00:00.000</span>
        </div>
        <div class="spacer"></div>
        <label class="precise-toggle">
          <input type="checkbox" id="precise-check" />
          精确模式
        </label>
        <span class="help" tabindex="0" aria-label="说明">?
          <span class="help-tip">无损模式（默认）用流复制，起点会自动吸附到最近的关键帧，可能与所选位置相差几帧，但画质零损失、速度极快。<br><br>勾选「精确模式」会重新编码以实现帧精确切割，速度较慢且有轻微画质损失。</span>
        </span>
      </div>
    </footer>
  </div>

  <!-- Re-encode settings modal -->
  <div id="reencode-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">重编码导出</div>
      <div class="preset-row">
        <button class="preset" data-preset="h264">高质量 H.264</button>
        <button class="preset" data-preset="h265">高压缩 H.265</button>
        <button class="preset" data-preset="vt">硬件加速</button>
        <button class="preset" data-preset="web">网页 WebM</button>
      </div>
      <div class="form-grid">
        <label>视频编码</label>
        <select id="re-vcodec">
          <option value="libx264">H.264 (libx264)</option>
          <option value="libx265">H.265 (libx265)</option>
          <!-- 可用的硬件编码器在运行时按平台自动注入到这里 -->
          <option value="libvpx-vp9">VP9 (libvpx-vp9)</option>
          <option value="copy">不重编码视频（仅改封装 / 音频）</option>
        </select>

        <label id="re-crf-label">质量 (CRF，越小越好)</label>
        <div class="quality-wrap" id="re-crf-wrap">
          <input type="range" id="re-crf" min="0" max="51" value="23" />
          <span id="re-crf-val">23</span>
        </div>

        <label id="re-bitrate-label" class="hidden">码率</label>
        <input id="re-bitrate" class="text-input hidden" value="8M" />

        <label>分辨率</label>
        <select id="re-res">
          <option value="">保持原始</option>
          <option value="2160">2160p (4K)</option>
          <option value="1440">1440p (2K)</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
        </select>

        <label>帧率</label>
        <select id="re-fps">
          <option value="">保持原始</option>
          <option value="60">60 fps</option>
          <option value="30">30 fps</option>
          <option value="24">24 fps</option>
        </select>

        <label>音频</label>
        <select id="re-audio">
          <option value="copy">保留原音轨</option>
          <option value="aac">重新编码</option>
          <option value="remove">移除音频</option>
        </select>

        <label>封装格式</label>
        <select id="re-container">
          <option value="mp4">MP4</option>
          <option value="mkv">MKV</option>
          <option value="mov">MOV</option>
          <option value="webm">WebM</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" data-close>取消</button>
        <button id="re-export" class="btn-primary">导出…</button>
      </div>
    </div>
  </div>

  <!-- Audio-only modal -->
  <div id="audio-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">仅导出音频</div>
      <div class="form-grid">
        <label>格式</label>
        <select id="au-format">
          <option value="mp3">MP3</option>
          <option value="m4a">AAC (m4a)</option>
          <option value="wav">WAV（无损）</option>
          <option value="flac">FLAC（无损）</option>
        </select>
        <label id="au-bitrate-label">码率</label>
        <select id="au-bitrate">
          <option value="320k">320 kbps</option>
          <option value="256k">256 kbps</option>
          <option value="192k" selected>192 kbps</option>
          <option value="128k">128 kbps</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" data-close>取消</button>
        <button id="au-export" class="btn-primary">导出…</button>
      </div>
    </div>
  </div>

  <!-- GIF modal -->
  <div id="gif-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">转为 GIF</div>
      <div class="form-grid">
        <label>帧率</label>
        <select id="gif-fps">
          <option value="10">10 fps</option>
          <option value="15" selected>15 fps</option>
          <option value="24">24 fps</option>
        </select>
        <label>宽度</label>
        <select id="gif-width">
          <option value="">保持原始</option>
          <option value="640">640 px</option>
          <option value="480" selected>480 px</option>
          <option value="320">320 px</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" data-close>取消</button>
        <button id="gif-export" class="btn-primary">导出…</button>
      </div>
    </div>
  </div>

  <!-- Export overlay -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-box">
      <div id="overlay-msg" class="overlay-msg">正在导出…</div>
      <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
      <div id="progress-pct" class="progress-pct">0%</div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
