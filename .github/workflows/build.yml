name: Build

# Build the macOS (.dmg) and Windows (.exe) apps.
# - Runs manually from the Actions tab (workflow_dispatch).
# - Runs on every push to main / PR so breakage is caught early (artifacts only).
# - On a version tag (v*), also publishes the installers to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required for the Release step on tags

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (x64)
            os: windows-latest
            script: dist:win
          - name: macOS (Apple Silicon)
            os: macos-14
            script: dist:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run ${{ matrix.script }}
        env:
          # Don't attempt code signing in CI (no certs) — produces an unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Helps ffmpeg-static avoid GitHub download rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: quick-trim-${{ runner.os }}-${{ runner.arch }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
